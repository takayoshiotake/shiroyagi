services:
  web:
    ports:
      - "8080:8080"

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    command: start-dev
    ports:
      - "8081:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD_FILE: /run/secrets/keycloak_admin_password
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    secrets:
      - keycloak_admin_password
    networks:
      - app

  dovecot:
    image: dovecot/dovecot:latest
    ports:
      - "2993:993"
      - "2143:143"
    volumes:
      - dovecot_data:/srv/mail
      - ./dev/dovecot:/etc/dovecot:ro
    networks:
      - app

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - app

volumes:
  dovecot_data:

secrets:
  keycloak_admin_password:
    file: ./secrets/dev/keycloak_admin_password
