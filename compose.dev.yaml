services:
  web:
    ports:
      - "8080:8080"

  postgres:
    ports:
      - "5432:5432"

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    command: start-dev --import-realm
    ports:
      - "8081:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./dev/keycloak:/opt/keycloak/data/import:ro
    networks:
      - app

  dovecot:
    image: dovecot/dovecot:latest
    depends_on:
      dovecot-seed:
        condition: service_completed_successfully
    ports:
      - "2143:31143"
    volumes:
      - dovecot_data:/srv/mail
      - ./dev/dovecot:/etc/dovecot:ro
    networks:
      - app

  dovecot-seed:
    image: alpine:latest
    command:
      - sh
      - -c
      - |
        mkdir -p /srv/mail/dev@example.test/Maildir/cur /srv/mail/dev@example.test/Maildir/new /srv/mail/dev@example.test/Maildir/tmp
        cp -n /fixtures/dev@example.test/Maildir/new/* /srv/mail/dev@example.test/Maildir/new/ 2>/dev/null || true
        chmod -R 0777 /srv/mail
    volumes:
      - dovecot_data:/srv/mail
      - ./dev/dovecot/fixtures:/fixtures:ro
    networks:
      - app

  mailpit:
    image: axllent/mailpit:latest
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - app

volumes:
  dovecot_data:
