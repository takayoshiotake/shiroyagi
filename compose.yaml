services:
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    depends_on:
      - postgres
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: shiroyagi
      DATABASE_USER: shiroyagi
      DATABASE_PASSWORD_FILE: /run/secrets/postgres_password

      MAIL_ACCOUNT_KEK_FILE: /run/secrets/mail_account_kek

      OIDC_ISSUER: http://keycloak:8080/realms/dev
      OIDC_BROWSER_ISSUER: http://localhost:8081/realms/dev
      OIDC_CLIENT_ID: shiroyagi
      OIDC_CLIENT_SECRET_FILE: /run/secrets/oidc_client_secret
      OIDC_REDIRECT_URI: http://localhost:8080/auth/callback

      IMAP_HOST: dovecot
      IMAP_PORT: "993"
      IMAP_TLS: "true"

      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
    secrets:
      - postgres_password
      - mail_account_kek
      - oidc_client_secret
    networks:
      - app

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: shiroyagi
      POSTGRES_USER: shiroyagi
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    networks:
      - app

networks:
  app:

volumes:
  postgres_data:

secrets:
  postgres_password:
    file: ./secrets/dev/postgres_password
  mail_account_kek:
    file: ./secrets/dev/mail_account_kek
  oidc_client_secret:
    file: ./secrets/dev/oidc_client_secret
