services:
  web:
    environment:
      OIDC_ISSUER: https://auth.example.com/realms/mail
      OIDC_REDIRECT_URI: https://mail.example.com/auth/callback

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
